server:
  port: 8080
  servlet:
    context-path: /project-user-manager

spring:
  #profile utilizzato di  diefualt se non specificato diversamente tramite variabile d'ambiente o argomento da linea di comando
  profiles:
    default: h2
  #configurazione spring security
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://idpgw.test4mind.com/realms/demo-interview}
  #configurazione rabbitmq
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

# Configurazione per logging con Logback
logging:
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%-5level] %logger{36} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%-5level] %logger{36} - %msg%n"
  level:
    com.intesi.userservice.audit: INFO
    org.springframework: ERROR
  file:
    name: logs/user-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 10
      file-name-pattern: logs/user-service-%d{yyyy-MM-dd}.%i.log

#Custom properties
keycloak:
  # Client ID registrato su Keycloak — usato per leggere resource_access.<client-id>.roles
  client-id: ${KEYCLOAK_CLIENT_ID:demo-task}



